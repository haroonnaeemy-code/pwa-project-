<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2196F3">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <title>آموزشگاه آفلاین</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- هدر -->
        <header>
            <img src="icons/a.jpg" alt="لوگو" class="logo" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ccircle cx=%2250%22 cy=%2250%22 r=%2250%22 fill=%22%232196F3%22/%3E%3Ctext x=%2250%22 y=%2267%22 text-anchor=%22middle%22 fill=%22white%22 font-size=%2240%22 font-weight=%22bold%22%3EA%3C/text%3E%3C/svg%3E'">
            <h1>📚 آموزشگاه آفلاین PWA</h1>
            <p>قابل نصب بدون اینترنت</p>
        </header>

        <!-- بنر نصب -->
        <div id="installBanner" class="install-banner" style="display: none;">
            <span>🚀 این وبسایت را نصب کنید</span>
            <button id="installBtn">نصب 📲</button>
        </div>

        <!-- منوی دستهبندی -->
        <div class="categories">
            <button class="cat-btn active" data-cat="all">همه</button>
            <button class="cat-btn" data-cat="web">🌐 وب</button>
            <button class="cat-btn" data-cat="mobile">📱 موبایل</button>
            <button class="cat-btn" data-cat="ai">🤖 هوش مصنوعی</button>
        </div>

        <!-- لیست دورهها -->
        <div id="coursesList" class="courses-list"></div>

        <!-- فوتر -->
        <footer>
            <p>نسخه 1.0 | نصب شده روی کامپیوتر شما</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
